name: Create Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.33.2)'
        required: true
      ref:
        description: 'Branch, commit SHA, or existing tag to tag from'
        required: false
        default: 'main'

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Create and push tag
        run: |
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}
