name: Enforce Review Policy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  enforce-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
    concurrency:
      group: enforce-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
    steps:
      - name: Enforce review policy
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const event = context.eventName;
            const isDependabot = pr.user?.login === 'dependabot[bot]';

            // Skip for Dependabot on all events
            if (isDependabot) {
              core.info('Dependabot PR detected - skipping review enforcement.');
              return;
            }

            // On opened, no reviews exist yet - pass without enforcing
            if (event === 'pull_request' && context.payload.action === 'opened') {
              core.info('PR opened - waiting for review, not enforcing yet.');
              return;
            }

            // On synchronize or pull_request_review: check current approval status
            core.info(`${event}/${context.payload.action} - checking current approval status...`);

            // If this is a review submission event, check the review in the payload first
            if (event === 'pull_request_review') {
              const submittedReview = context.payload.review;
              if (submittedReview?.state === 'APPROVED') {
                const isNonBazReviewer = submittedReview.user?.login !== 'baz-reviewer' && submittedReview.user?.type === 'User';
                if (isNonBazReviewer) {
                  core.info(`Approval received from ${submittedReview.user.login} - approval requirement satisfied.`);
                  return;
                }
              }
              if (submittedReview?.state === 'DISMISSED') {
                core.info('Review dismissed - will check if other approvals exist.');
              }
            }

            // Fetch reviews with retry for eventual consistency.
            // On pull_request_review events, retry until we see a valid approval — not just
            // any review — because a stale dismissed review would otherwise cause an immediate
            // break before the newly submitted APPROVED review propagates through the API.
            let reviews;
            let attempts = 0;
            while (attempts < 3) {
              const result = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              reviews = result.data;

              const hasApproval = reviews.some(
                r => r.state === 'APPROVED' &&
                     r.user?.login !== 'baz-reviewer' &&
                     r.user?.type === 'User'
              );

              // For non-review events, stop immediately. For review events, keep retrying
              // until we see a valid approval (covers eventual consistency after dismiss+re-approve).
              if (event !== 'pull_request_review' || hasApproval) {
                break;
              }

              // Wait before retry
              attempts++;
              if (attempts < 3) {
                core.info(`No valid approval found yet (attempt ${attempts}/3) - retrying...`);
                await new Promise(resolve => setTimeout(resolve, 1000));
              }
            }

            const approvals = reviews.filter(r => r.state === 'APPROVED');

            // On synchronize/reopened, if no reviews exist yet, don't block the PR
            if (event === 'pull_request' && reviews.length === 0) {
              core.info('No reviews yet - waiting for review, not enforcing.');
              return;
            }

            const hasNonBazApproval = approvals.some(
              r => r.user?.login &&
                   r.user.login !== 'baz-reviewer' &&
                   r.user.type === 'User'
            );

            if (!hasNonBazApproval) {
              core.setFailed('At least one approval from a non-baz-reviewer is required.');
            }

  dependabot-ci-failure:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    permissions:
      pull-requests: write
    steps:
      - name: Request review from random product team member on CI failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GALILEO_AUTOMATION_GITHUB_TOKEN }}
          script: |
            // Get the PR associated with this workflow run
            const workflowRun = context.payload.workflow_run;

            if (!workflowRun.pull_requests || workflowRun.pull_requests.length === 0) {
              core.info('No pull request associated with this workflow run.');
              return;
            }

            const prNumber = workflowRun.pull_requests[0].number;

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const isDependabot = pr.user?.login === 'dependabot[bot]';

            if (!isDependabot) {
              core.info('PR is not from Dependabot - skipping CI failure notification.');
              return;
            }

            core.info(`Dependabot PR #${prNumber} CI failed - requesting review from random product team member.`);

            // Get members of the rungalileo/product team
            let teamMembers;
            try {
              const { data: members } = await github.rest.teams.listMembersInOrg({
                org: 'rungalileo',
                team_slug: 'product',
              });
              teamMembers = members.map(m => m.login);
            } catch (error) {
              core.setFailed(`Failed to fetch team members: ${error.message}`);
              return;
            }

            if (teamMembers.length === 0) {
              core.setFailed('No members found in rungalileo/product team.');
              return;
            }

            // Select a random team member
            const randomMember = teamMembers[Math.floor(Math.random() * teamMembers.length)];
            core.info(`Selected random reviewer: ${randomMember}`);

            // Request review from the selected member
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: [randomMember]
              });
              core.info(`Successfully requested review from ${randomMember} for PR #${prNumber}`);
            } catch (error) {
              core.setFailed(`Failed to request review: ${error.message}`);
            }
